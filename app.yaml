name: relisabackmob-app
databases:
  - engine: PG
    name: db
    num_nodes: 1
    size: db-s-dev-database
    version: "16"
services:
  - name: backend
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    git:
      branch: main
      repo_clone_url: https://github.com/Onsakia/relisa-backend.git
    source_dir: /
    run_command: gunicorn backend_collect.wsgi:application --bind 0.0.0.0:8080 --worker-tmp-dir /dev/shm
    build_command: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    routes:
      - path: /
    envs:
      - key: SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ab3x9k2m5p7q1r4t6u8v0w2y4z6a8c0e2g4i6k8m0o2q4s6u8w0y2a4c6e8g0i2k4m
      - key: DEBUG
        scope: RUN_AND_BUILD_TIME
        value: "False"
      - key: ALLOWED_HOSTS
        scope: RUN_AND_BUILD_TIME
        value: ".ondigitalocean.app"
      - key: CORS_ALLOWED_ORIGINS
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: "${db.DATABASE_URL}"
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    git:
      branch: main
      repo_clone_url: https://github.com/Onsakia/relisa-backend.git
    source_dir: /
    run_command: python manage.py migrate --noinput
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: "${db.DATABASE_URL}"